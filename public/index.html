<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>竞品排名监测看板</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #dde6f2;
      --text: #172033;
      --muted: #647084;
      --accent: #2457d6;
      --good: #168a45;
      --warn: #b86b00;
      --bad: #c92a2a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; }
    .wrap { max-width: 1440px; margin: 0 auto; padding: 24px; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-end; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 32px; line-height: 1.15; }
    .meta { color: var(--muted); font-size: 13px; margin-top: 8px; display: flex; gap: 14px; flex-wrap: wrap; }
    .status { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .card, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
    .card { padding: 14px; }
    .card .k { color: var(--muted); font-size: 12px; }
    .card .v { font-size: 28px; font-weight: 800; margin-top: 6px; }
    .panel { padding: 16px; margin-top: 14px; overflow: auto; }
    .panel h2 { margin: 0 0 12px; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; min-width: 920px; }
    th, td { border: 1px solid var(--line); padding: 9px 10px; text-align: left; font-size: 13px; white-space: nowrap; }
    th { background: #f0f4fa; }
    .rank { font-weight: 800; }
    .SUCCESS, .PARTIAL_SUCCESS { color: var(--good); font-weight: 700; }
    .PENDING_TODAY, .NO_DATA_SOURCE { color: var(--warn); font-weight: 700; }
    .FAILED, .RANK_CAPTURE_FAILED, .RATE_LIMITED { color: var(--bad); font-weight: 700; }
    .empty { padding: 32px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 8px; background: #fbfdff; }
    .banner { display: none; border: 1px solid #f0c36a; background: #fff7e8; color: #805000; border-radius: 8px; padding: 12px; margin-bottom: 14px; }
    @media (max-width: 920px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>竞品排名监测看板</h1>
        <div class="meta">
          <span>最新监测日期：<b id="latestDate">-</b></span>
          <span>生成时间：<b id="generatedAt">-</b></span>
          <span>最近任务：<b id="lastRun">-</b></span>
        </div>
      </div>
      <div class="status" id="apiStatus">正在连接 Cloudflare Worker...</div>
    </header>

    <div class="banner" id="emptyBanner"></div>

    <section class="grid">
      <div class="card"><div class="k">成功</div><div class="v" id="successCount">0</div></div>
      <div class="card"><div class="k">待更新</div><div class="v" id="pendingCount">0</div></div>
      <div class="card"><div class="k">失败</div><div class="v" id="failedCount">0</div></div>
      <div class="card"><div class="k">产品数</div><div class="v" id="productCount">0</div></div>
      <div class="card"><div class="k">国家数</div><div class="v" id="countryCount">0</div></div>
      <div class="card"><div class="k">记录数</div><div class="v" id="rowCount">0</div></div>
    </section>

    <section class="panel">
      <h2>最新排名矩阵</h2>
      <div id="matrix"></div>
    </section>

    <section class="panel">
      <h2>原始记录</h2>
      <div id="rows"></div>
    </section>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const rank = value => value === null || value === undefined || value === "" ? "-" : `#${value}`;
    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[ch]));
    const safeStatusClass = value => {
      const normalized = String(value || "").toUpperCase();
      return /^(SUCCESS|PARTIAL_SUCCESS|PENDING_TODAY|NO_DATA_SOURCE|FAILED|RANK_CAPTURE_FAILED|RATE_LIMITED)$/.test(normalized) ? normalized : "FAILED";
    };
    const statusLabel = value => ({
      SUCCESS: "成功",
      PARTIAL_SUCCESS: "部分成功",
      PENDING_TODAY: "待更新",
      NO_DATA_SOURCE: "未配置数据源",
      FAILED: "失败",
      RANK_CAPTURE_FAILED: "抓取失败",
      RATE_LIMITED: "限流"
    }[value] || value || "-");

    function renderMatrix(data) {
      const byKey = new Map(data.latest_rows.map(row => [`${row.brand}|${row.country}`, row]));
      let html = "<table><thead><tr><th>市场</th>";
      data.brands.forEach(brand => html += `<th>${escapeHtml(brand)}</th>`);
      html += "</tr></thead><tbody>";
      data.countries.forEach(country => {
        html += `<tr><td>${escapeHtml((data.country_names && data.country_names[country]) || country)} ${escapeHtml(country)}</td>`;
        data.brands.forEach(brand => {
          const row = byKey.get(`${brand}|${country}`);
          html += `<td><span class="rank">${escapeHtml(rank(row && row.revenue_rank_tools))}</span><br><span class="${safeStatusClass(row && row.status)}">${escapeHtml(statusLabel(row && row.status))}</span></td>`;
        });
        html += "</tr>";
      });
      html += "</tbody></table>";
      $("matrix").innerHTML = html;
    }

    function renderRows(data) {
      const rows = data.latest_rows || [];
      if (!rows.length) {
        $("rows").innerHTML = "<div class='empty'>暂无数据。</div>";
        return;
      }
      let html = "<table><thead><tr><th>日期</th><th>产品</th><th>国家</th><th>收入排行-工具</th><th>Tooltip 日期</th><th>状态</th><th>来源</th></tr></thead><tbody>";
      rows.forEach(row => {
        html += `<tr><td>${escapeHtml(row.date || "")}</td><td>${escapeHtml(row.brand)}</td><td>${escapeHtml(row.country)}</td><td>${escapeHtml(rank(row.revenue_rank_tools))}</td><td>${escapeHtml(row.tooltip_date || "-")}</td><td class="${safeStatusClass(row.status)}">${escapeHtml(statusLabel(row.status))}</td><td>${escapeHtml(row.data_origin || "-")}</td></tr>`;
      });
      html += "</tbody></table>";
      $("rows").innerHTML = html;
    }

    async function boot() {
      try {
        const res = await fetch("/api/dashboard", { headers: { accept: "application/json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        $("apiStatus").textContent = "Cloudflare Worker 已连接";
        $("latestDate").textContent = data.overview.latest_monitor_date || "-";
        $("generatedAt").textContent = data.generated_at || "-";
        $("lastRun").textContent = data.overview.last_run_status || "-";
        $("successCount").textContent = data.overview.success_count || 0;
        $("pendingCount").textContent = data.overview.pending_count || 0;
        $("failedCount").textContent = data.overview.failed_count || 0;
        $("productCount").textContent = data.overview.product_count || 0;
        $("countryCount").textContent = data.overview.country_count || 0;
        $("rowCount").textContent = (data.latest_rows || []).length;
        if (!data.latest_monitor_file_date) {
          $("emptyBanner").style.display = "block";
          $("emptyBanner").textContent = "Cloudflare 定时任务已就绪，但还没有排名数据。配置 SENSOR_TOWER_FEED_URL 或使用上传脚本导入现有 CSV 后，这里会自动展示。";
        }
        renderMatrix(data);
        renderRows(data);
      } catch (err) {
        $("apiStatus").textContent = "API 连接失败";
        $("matrix").innerHTML = `<div class="empty">无法加载 /api/dashboard：${escapeHtml(err.message)}</div>`;
        $("rows").innerHTML = "";
      }
    }
    boot();
  </script>
</body>
</html>
